<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ t_change_password }} · {{ domain }}</title>
<script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
<script>
function clearElkAndGo(){
  Object.keys(localStorage).filter(k=>k.startsWith('elk-')).forEach(k=>localStorage.removeItem(k));
  var r=indexedDB.open('keyval-store');
  r.onsuccess=function(e){var t=e.target.result.transaction('keyval','readwrite');t.objectStore('keyval').delete('elk-users');t.oncomplete=go;t.onerror=go};
  r.onerror=go;
  function go(){location.replace('/')}
}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;border-bottom:1px solid #1e1e1e;font-size:.8rem;color:#666}
.topbar-domain{font-weight:500;color:#aaa}
.topbar-right{display:flex;align-items:center;gap:1rem}
.back-link{color:#888;text-decoration:none;font-size:.8rem}
.back-link:hover{color:#ccc}
.signout-btn{background:none;border:1px solid #333;color:#888;padding:.3rem .7rem;border-radius:4px;cursor:pointer;font-size:.75rem}
.signout-btn:hover{border-color:#555;color:#ccc}
.content{max-width:480px;margin:0 auto;padding:2.5rem 1.5rem}
h1{font-size:1.1rem;font-weight:600;margin-bottom:1.5rem}
label{display:block;font-size:.8rem;color:#aaa;margin-bottom:.25rem;margin-top:1rem}
input[type=password]{width:100%;padding:.6rem .75rem;background:#111;border:1px solid #333;border-radius:4px;color:#e8e8e8;font-size:.9rem}
input:focus{outline:none;border-color:#555}
button[type=submit]{margin-top:1.5rem;width:100%;padding:.7rem;background:#e8e8e8;color:#111;border:none;border-radius:4px;font-size:.9rem;font-weight:600;cursor:pointer}
button[type=submit]:hover{background:#fff}
.success{background:#1a3a1a;border:1px solid #2a6a2a;color:#8f8;padding:.6rem .75rem;border-radius:4px;font-size:.85rem;margin-bottom:1rem}
.error{background:#3a1a1a;border:1px solid #6a2a2a;color:#f88;padding:.6rem .75rem;border-radius:4px;font-size:.85rem;margin-bottom:1rem}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-domain">{{ domain }}</span>
  <div class="topbar-right">
    <a class="back-link" href="/account">{{ t_back_to_account }}</a>
    <button class="signout-btn"
            hx-post="/account/logout"
            hx-swap="none"
            hx-on::after-request="clearElkAndGo()">{{ t_sign_out }}</button>
  </div>
</div>
<div class="content">
  <h1>{{ t_change_password }}</h1>
  <div id="msg">
    {% if ok %}<div class="success">{{ t_password_changed }}</div>{% endif %}
    {% if mismatch %}<div class="error">{{ t_password_mismatch }}</div>{% endif %}
    {% if err %}<div class="error">{{ t_password_error }}</div>{% endif %}
  </div>
  <form hx-post="/account/password" hx-target="#msg" hx-swap="innerHTML">
    <label for="current_password">{{ t_current_password }}</label>
    <input type="password" id="current_password" name="current_password" required autocomplete="current-password">
    <label for="new_password">{{ t_new_password }}</label>
    <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">
    <label for="new_password_confirm">{{ t_confirm_password }}</label>
    <input type="password" id="new_password_confirm" name="new_password_confirm" required minlength="8" autocomplete="new-password">
    <button type="submit">{{ t_change_password }}</button>
  </form>
</div>
</body>
</html>
