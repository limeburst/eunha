<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ t_invite_tree }} · {{ domain }}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.5rem;border-bottom:1px solid #1e1e1e;font-size:.8rem;color:#666}
.topbar-domain{font-weight:500;color:#aaa}
.topbar-right{display:flex;align-items:center;gap:1rem}
.back-link{color:#888;text-decoration:none;font-size:.8rem}
.back-link:hover{color:#ccc}
.signout-btn{background:none;border:1px solid #333;color:#888;padding:.3rem .7rem;border-radius:4px;cursor:pointer;font-size:.75rem}
.signout-btn:hover{border-color:#555;color:#ccc}
.content{max-width:480px;margin:0 auto;padding:2.5rem 1.5rem}
h1{font-size:1.1rem;font-weight:600;margin-bottom:1.5rem}
.member{display:flex;align-items:baseline;gap:.5rem;padding:.3rem 0;font-size:.9rem}
.username{color:#e8e8e8}
.invited-by{font-size:.75rem;color:#555}
.empty{color:#666;font-size:.85rem}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-domain">{{ domain }}</span>
  <div class="topbar-right">
    <a class="back-link" href="/account">{{ t_back_to_account }}</a>
    <form method="POST" action="/account/logout">
      <button class="signout-btn" type="submit">{{ t_sign_out }}</button>
    </form>
  </div>
</div>
<div class="content">
  <h1>{{ t_invite_tree }}</h1>
  {% if members | length == 0 %}
    <p class="empty">{{ t_no_members }}</p>
  {% else %}
    {% for member in members %}
    <div class="member" style="padding-left:{{ member.depth * 1.25 }}rem">
      <span class="username">@{{ member.username }}</span>
      {% if member.invited_by %}<span class="invited-by">← @{{ member.invited_by }}</span>{% endif %}
    </div>
    {% endfor %}
  {% endif %}
</div>
</body>
</html>
