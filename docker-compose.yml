services:
  app:
    build:
      context: .
      network: host
      args:
        DATABASE_URL: ${DATABASE_URL}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BIND_ADDRESS: 0.0.0.0:3000
      CONSOLE_DOMAIN: ${CONSOLE_DOMAIN}
      RUST_LOG: info
    ports:
      - "50000:3000"
    volumes:
      - ./config.toml:/app/config.toml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
